name: Manual Stacktrace Diagnostics

on:
  workflow_dispatch:
    inputs:
      target_flavor:
        description: 'Target flavor or "all"'
        required: true
        default: 'all'
        type: string
      build_type:
        description: 'Build type for assemble tasks'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
      run_static:
        description: 'Run detekt + ktlintCheck'
        required: false
        default: true
        type: boolean
      run_lint:
        description: 'Run Android lint tasks for selected flavors (Debug variant)'
        required: false
        default: true
        type: boolean
      run_tests:
        description: 'Run unit tests for selected flavors (Debug variant)'
        required: false
        default: true
        type: boolean
      run_assemble:
        description: 'Run assemble tasks for selected flavors'
        required: false
        default: true
        type: boolean
      max_workers:
        description: 'Gradle max workers'
        required: false
        default: '2'
        type: string
      fail_on_fatal:
        description: 'Fail workflow only when fatal task errors exist'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ format('manual-diagnostics-{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g -Djava.awt.headless=true -Dorg.gradle.daemon=false -Dksp.incremental=false
  JAVA_VERSION: '21'
  ANDROID_API_LEVEL: 36

jobs:
  stacktrace-diagnostics:
    name: Stacktrace Diagnostics
    runs-on: ubuntu-latest
    env:
      FIREBASE_WEB_CLIENT_ID: ${{ secrets.FIREBASE_WEB_CLIENT_ID }}
      FIREBASE_CONFIGS_ZIP_BASE64: ${{ secrets.FIREBASE_CONFIGS_ZIP_BASE64 }}
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_FIREBASE_OBJECT: ${{ secrets.CF_R2_FIREBASE_OBJECT }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: false
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;36.0.0"

      - name: Accept Android SDK licenses (non-interactive)
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          set +o pipefail
          yes | sdkmanager --licenses --sdk_root="$SDK_ROOT" >/dev/null
          set -o pipefail

      - uses: gradle/actions/setup-gradle@v5

      - name: Resolve Flavors
        id: resolve
        uses: ./.github/actions/resolve-flavors
        with:
          target_flavors: ${{ github.event.inputs.target_flavor }}

      - name: Verify env contract
        uses: ./.github/actions/verify-env-contract

      - name: Export firebase override + web client env
        uses: ./.github/actions/export-firebase-override-env

      - name: Firebase Config Override (R2 preferred, Base64 fallback)
        uses: ./.github/actions/firebase-config
        with:
          firebase_configs_zip_base64: ${{ env.FIREBASE_CONFIGS_ZIP_BASE64 }}
          cf_r2_account_id: ${{ env.CF_R2_ACCOUNT_ID }}
          cf_api_token: ${{ env.CF_API_TOKEN }}
          cf_r2_bucket: ${{ env.CF_R2_BUCKET }}
          cf_r2_firebase_object: ${{ env.CF_R2_FIREBASE_OBJECT }}

      - name: Validate Google Sign-In Config
        uses: ./.github/actions/verify-google-signin-config
        with:
          flavors: ${{ steps.resolve.outputs.resolved_csv }}

      - name: Run Gradle diagnostics with stacktrace
        shell: bash
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
          RUN_STATIC: ${{ github.event.inputs.run_static }}
          RUN_LINT: ${{ github.event.inputs.run_lint }}
          RUN_TESTS: ${{ github.event.inputs.run_tests }}
          RUN_ASSEMBLE: ${{ github.event.inputs.run_assemble }}
          MAX_WORKERS: ${{ github.event.inputs.max_workers }}
          RESOLVED_FLAVORS_JSON: ${{ steps.resolve.outputs.resolved_json }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          mkdir -p diagnostics/logs diagnostics/reports
          : > diagnostics/reports/status.tsv

          mapfile -t FLAVORS < <(echo "$RESOLVED_FLAVORS_JSON" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')

          capitalize() {
            local s="$1"
            echo "$(tr '[:lower:]' '[:upper:]' <<< "${s:0:1}")${s:1}"
          }

          run_gradle_task() {
            local task_name="$1"
            shift
            local log_file="diagnostics/logs/${task_name}.log"
            echo "Running $task_name -> $*"
            set +e
            ./gradlew "$@" --stacktrace --warning-mode all --no-daemon --console=plain --max-workers="${MAX_WORKERS}" 2>&1 | tee "$log_file"
            local cmd_status=${PIPESTATUS[0]}
            set -e
            printf '%s\t%s\t%s\n' "$task_name" "$cmd_status" "$log_file" >> diagnostics/reports/status.tsv
          }

          if [ "$RUN_STATIC" = "true" ]; then
            run_gradle_task "static_analysis" detekt ktlintCheck
          fi

          if [ "$RUN_LINT" = "true" ] && [ "${#FLAVORS[@]}" -gt 0 ]; then
            LINT_TASKS=()
            for flavor in "${FLAVORS[@]}"; do
              [ -z "$flavor" ] && continue
              cap="$(capitalize "$flavor")"
              LINT_TASKS+=("lint${cap}Debug")
            done
            [ "${#LINT_TASKS[@]}" -gt 0 ] && run_gradle_task "android_lint" "${LINT_TASKS[@]}"
          fi

          if [ "$RUN_TESTS" = "true" ] && [ "${#FLAVORS[@]}" -gt 0 ]; then
            TEST_TASKS=()
            for flavor in "${FLAVORS[@]}"; do
              [ -z "$flavor" ] && continue
              cap="$(capitalize "$flavor")"
              TEST_TASKS+=("test${cap}DebugUnitTest")
            done
            [ "${#TEST_TASKS[@]}" -gt 0 ] && run_gradle_task "unit_tests" "${TEST_TASKS[@]}"
          fi

          if [ "$RUN_ASSEMBLE" = "true" ] && [ "${#FLAVORS[@]}" -gt 0 ]; then
            ASSEMBLE_TASKS=()
            for flavor in "${FLAVORS[@]}"; do
              [ -z "$flavor" ] && continue
              cap="$(capitalize "$flavor")"
              ASSEMBLE_TASKS+=("assemble${cap}${BUILD_TYPE}")
            done
            [ "${#ASSEMBLE_TASKS[@]}" -gt 0 ] && run_gradle_task "assemble" "${ASSEMBLE_TASKS[@]}"
          fi

      - name: Build diagnostics report
        id: report
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          status_file = Path("diagnostics/reports/status.tsv")
          report_md = Path("diagnostics/reports/summary.md")
          report_json = Path("diagnostics/reports/summary.json")
          rows = []
          if status_file.exists():
              for line in status_file.read_text(encoding="utf-8").splitlines():
                  if line.strip():
                      name, code, logfile = line.split("\t")
                      rows.append((name, int(code), Path(logfile)))

          warning_re = re.compile(r"\bwarning\b|\bw:\b|\bWARN\b", re.IGNORECASE)
          error_re = re.compile(r"\berror\b|\be:\b|\bFAILED\b", re.IGNORECASE)
          fatal_markers = ("BUILD FAILED", "FAILURE: Build failed with an exception", "Execution failed for task")
          total_warnings = 0
          total_errors = 0
          fatal_tasks = 0
          task_rows = []
          for name, code, log_path in rows:
              warnings = errors = 0
              has_fatal_marker = False
              if log_path.exists():
                  text = log_path.read_text(encoding="utf-8", errors="ignore")
                  warnings = len(warning_re.findall(text))
                  errors = len(error_re.findall(text))
                  has_fatal_marker = any(marker in text for marker in fatal_markers) or bool(re.search(r"Task .* FAILED", text))
              is_fatal = code != 0 or has_fatal_marker
              fatal_tasks += 1 if is_fatal else 0
              total_warnings += warnings
              total_errors += errors
              task_rows.append({"task": name, "exit_code": code, "warnings": warnings, "errors": errors, "fatal": is_fatal, "log": str(log_path)})

          payload = {"fatal_task_count": fatal_tasks, "total_warnings": total_warnings, "total_errors": total_errors, "tasks": task_rows}
          report_json.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          lines = ["# Manual Stacktrace Diagnostics Report", "", f"- Fatal tasks: **{fatal_tasks}**", f"- Warning matches: **{total_warnings}**", f"- Error matches: **{total_errors}**", "", "| Task Group | Exit | Fatal | Warning Matches | Error Matches | Log |", "|---|---:|:---:|---:|---:|---|"]
          for row in task_rows:
              lines.append(f"| {row['task']} | {row['exit_code']} | {'yes' if row['fatal'] else 'no'} | {row['warnings']} | {row['errors']} | `{row['log']}` |")
          report_md.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          FATAL_TASK_COUNT="$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('diagnostics/reports/summary.json').read_text(encoding='utf-8')).get('fatal_task_count', 0))
          PY
          )"
          echo "fatal_task_count=$FATAL_TASK_COUNT" >> "$GITHUB_OUTPUT"
          cat diagnostics/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: manual-stacktrace-diagnostics-${{ github.run_id }}
          path: |
            diagnostics/reports/summary.md
            diagnostics/reports/summary.json
            diagnostics/reports/status.tsv
            diagnostics/logs/*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Fail only on fatal errors
        if: github.event.inputs.fail_on_fatal == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fatal_count='${{ steps.report.outputs.fatal_task_count }}'
          if [ -z "$fatal_count" ]; then
            echo "::error::Fatal count missing from diagnostics report"
            exit 1
          fi
          if [ "$fatal_count" -gt 0 ]; then
            echo "::error::Found fatal task failures (${fatal_count}). Check diagnostics artifact."
            exit 1
          fi
          echo "No fatal task failures detected."
