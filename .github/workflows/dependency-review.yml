name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Dependency Review Disabled Notice
        if: ${{ vars.DEPENDENCY_REVIEW_ENABLED != 'true' }}
        run: |
          echo "::warning title=Dependency review skipped::Enable GitHub Dependency Graph for this repository and set repository variable DEPENDENCY_REVIEW_ENABLED=true to run actions/dependency-review-action."

      - name: Dependency Review
        if: ${{ vars.DEPENDENCY_REVIEW_ENABLED == 'true' }}
        uses: actions/dependency-review-action@v4
        with:
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 600
