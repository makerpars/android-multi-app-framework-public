name: Auto Debug Ops

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'core/**'
      - 'feature/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'app-versions.properties'
      - 'scripts/ci/**'
      - '.github/actions/resolve-flavors/**'
      - '.github/actions/firebase-config/**'
      - '.github/actions/export-firebase-override-env/**'
      - '.github/actions/verify-google-signin-config/**'
      - '.github/actions/verify-env-contract/**'
  pull_request:
    branches: ['*']
    paths:
      - 'app/**'
      - 'core/**'
      - 'feature/**'
      - 'buildSrc/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'app-versions.properties'
      - 'scripts/ci/**'
      - '.github/actions/resolve-flavors/**'
      - '.github/actions/firebase-config/**'
      - '.github/actions/export-firebase-override-env/**'
      - '.github/actions/verify-google-signin-config/**'
      - '.github/actions/verify-env-contract/**'

permissions:
  contents: read

concurrency:
  group: ${{ format('ci-{0}-{1}', github.workflow, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g -Djava.awt.headless=true -Dkotlin.daemon.jvmargs=-Xmx1g -Dorg.gradle.workers.max=2 -Dorg.gradle.daemon=false -Dksp.incremental=false
  JAVA_VERSION: '21'
  ANDROID_API_LEVEL: 36

jobs:
  resolve-flavors:
    name: Resolve flavors
    runs-on: ubuntu-latest
    outputs:
      resolved_flavors_json: ${{ steps.resolve.outputs.resolved_json }}
      resolved_flavors_csv: ${{ steps.resolve.outputs.resolved_csv }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve Flavors
        id: resolve
        uses: ./.github/actions/resolve-flavors
        with:
          target_flavors: all

  prepare-shared-config:
    name: Prepare shared config
    needs: resolve-flavors
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      FIREBASE_WEB_CLIENT_ID: ${{ secrets.FIREBASE_WEB_CLIENT_ID }}
      FIREBASE_CONFIGS_ZIP_BASE64: ${{ secrets.FIREBASE_CONFIGS_ZIP_BASE64 }}
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_FIREBASE_OBJECT: ${{ secrets.CF_R2_FIREBASE_OBJECT }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Verify env contract
        uses: ./.github/actions/verify-env-contract

      - name: Export firebase override + web client env
        uses: ./.github/actions/export-firebase-override-env

      - name: Firebase Config Override (R2 preferred, Base64 fallback)
        uses: ./.github/actions/firebase-config
        with:
          firebase_configs_zip_base64: ${{ env.FIREBASE_CONFIGS_ZIP_BASE64 }}
          cf_r2_account_id: ${{ env.CF_R2_ACCOUNT_ID }}
          cf_api_token: ${{ env.CF_API_TOKEN }}
          cf_r2_bucket: ${{ env.CF_R2_BUCKET }}
          cf_r2_firebase_object: ${{ env.CF_R2_FIREBASE_OBJECT }}

      - name: Validate Google Sign-In Config
        uses: ./.github/actions/verify-google-signin-config
        with:
          flavors: ${{ needs.resolve-flavors.outputs.resolved_flavors_csv }}

      - name: Create firebase config archive
        shell: bash
        run: |
          set -euo pipefail
          tar -czf firebase-config-artifact.tar.gz app/src/*/google-services.json

      - name: Upload firebase config archive
        uses: actions/upload-artifact@v6
        with:
          name: auto-debug-firebase-config-${{ github.run_id }}
          path: firebase-config-artifact.tar.gz
          if-no-files-found: error
          retention-days: 1

  pr-secret-dependent-ops-notice:
    name: PR secret-dependent ops notice
    needs: resolve-flavors
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Explain PR skip
        run: |
          echo "::notice title=Auto Debug Ops PR skip::Firebase-dependent debug build and lint jobs run on main push. Pull requests are covered by Quality Gate without requiring repository secrets."

  static-analysis:
    name: Static analysis
    needs:
      - resolve-flavors
      - prepare-shared-config
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore firebase config artifact
        uses: actions/download-artifact@v6
        with:
          name: auto-debug-firebase-config-${{ github.run_id }}
          path: .

      - name: Extract firebase config artifact
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf firebase-config-artifact.tar.gz

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;36.0.0"

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          set +o pipefail
          yes | sdkmanager --licenses --sdk_root="$SDK_ROOT" >/dev/null
          set -o pipefail

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run detekt / ktlint
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew detekt ktlintCheck --stacktrace --no-daemon --max-workers=2

  lint-flavor:
    name: Lint ${{ matrix.flavor }} Debug
    needs:
      - resolve-flavors
      - prepare-shared-config
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      FLAVOR: ${{ matrix.flavor }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        flavor: ${{ fromJSON(needs.resolve-flavors.outputs.resolved_flavors_json) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore firebase config artifact
        uses: actions/download-artifact@v6
        with:
          name: auto-debug-firebase-config-${{ github.run_id }}
          path: .

      - name: Extract firebase config artifact
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf firebase-config-artifact.tar.gz

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;36.0.0"

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          set +o pipefail
          yes | sdkmanager --licenses --sdk_root="$SDK_ROOT" >/dev/null
          set -o pipefail

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run Android lint for flavor
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          cap="$(tr '[:lower:]' '[:upper:]' <<< "${FLAVOR:0:1}")${FLAVOR:1}"
          ./gradlew "lint${cap}Debug" --stacktrace --no-daemon --max-workers=2

  build-debug-flavor:
    name: Build ${{ matrix.flavor }} Debug
    needs:
      - resolve-flavors
      - prepare-shared-config
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      FLAVOR: ${{ matrix.flavor }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        flavor: ${{ fromJSON(needs.resolve-flavors.outputs.resolved_flavors_json) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore firebase config artifact
        uses: actions/download-artifact@v6
        with:
          name: auto-debug-firebase-config-${{ github.run_id }}
          path: .

      - name: Extract firebase config artifact
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf firebase-config-artifact.tar.gz

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;36.0.0"

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          set +o pipefail
          yes | sdkmanager --licenses --sdk_root="$SDK_ROOT" >/dev/null
          set -o pipefail

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build Debug APK for flavor
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          cap="$(tr '[:lower:]' '[:upper:]' <<< "${FLAVOR:0:1}")${FLAVOR:1}"
          ./gradlew "assemble${cap}Debug" --stacktrace --no-daemon --max-workers=2

      - name: Upload flavor build outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: auto-debug-ops-build-outputs-${{ matrix.flavor }}
          path: |
            app/build/outputs/apk/
            app/build/outputs/mapping/
          retention-days: 7
