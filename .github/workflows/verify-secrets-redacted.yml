name: Verify Secrets (Redacted)

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify required values without exposing them
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      PUSH_REGISTRATION_URL: ${{ secrets.PUSH_REGISTRATION_URL }}
      PURCHASE_VERIFICATION_URL: ${{ secrets.PURCHASE_VERIFICATION_URL }}
      FIREBASE_WEB_CLIENT_ID: ${{ secrets.FIREBASE_WEB_CLIENT_ID }}
      ADMIN_ALLOWED_EMAILS: ${{ secrets.ADMIN_ALLOWED_EMAILS }}
      ADMOB_CLIENT_ID: ${{ secrets.ADMOB_CLIENT_ID }}
      ADMOB_CLIENT_SECRET: ${{ secrets.ADMOB_CLIENT_SECRET }}
      ADMOB_REFRESH_TOKEN: ${{ secrets.ADMOB_REFRESH_TOKEN }}
      ADMOB_PUBLISHER_ID: ${{ secrets.ADMOB_PUBLISHER_ID }}
      PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Verify env contract
        uses: ./.github/actions/verify-env-contract

      - name: Validate required values (length only)
        shell: bash
        run: |
          set -euo pipefail

          check_value() {
            local key="$1"
            local min_len="$2"
            local value="${!key:-}"
            local len="${#value}"
            if [ "$len" -lt "$min_len" ]; then
              echo "::error::${key} missing or too short (len=${len}, expected>=${min_len})"
              return 1
            fi
            echo "::notice::${key} OK (len=${len})"
          }

          check_value KEYSTORE_BASE64 1000
          check_value KEYSTORE_PASSWORD 4
          check_value KEY_ALIAS 2
          check_value KEY_PASSWORD 4
          check_value PUSH_REGISTRATION_URL 12
          check_value PURCHASE_VERIFICATION_URL 12
          check_value FIREBASE_WEB_CLIENT_ID 20
          check_value ADMIN_ALLOWED_EMAILS 8
          check_value ADMOB_CLIENT_ID 20
          check_value ADMOB_CLIENT_SECRET 20
          check_value ADMOB_REFRESH_TOKEN 20
          check_value ADMOB_PUBLISHER_ID 10
          check_value PLAY_SERVICE_ACCOUNT_JSON_BASE64 500

          [[ "$PUSH_REGISTRATION_URL" == https://* ]] || { echo "::error::PUSH_REGISTRATION_URL must start with https://"; exit 1; }
          [[ "$PURCHASE_VERIFICATION_URL" == https://* ]] || { echo "::error::PURCHASE_VERIFICATION_URL must start with https://"; exit 1; }

      - name: Validate Firebase Functions env contract
        shell: bash
        run: |
          set -euo pipefail
          node ./side-projects/firebase/functions/scripts/verify-functions-env.mjs
