name: Jules - Weekly Quality and Security

on:
  schedule:
    - cron: '30 3 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jules-weekly-quality:
    if: ${{ github.repository_owner == 'MakerPars' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_commit_log: true
          prompt: |
            Follow .github/jules/prompts/weekly-quality.md.
            Fix only verified quality, security, lifecycle, lint, test, or app-ads.txt issues.
            Do not add lint/detekt baselines, weaken tests, commit secrets, or make release/publish changes.
            Open a PR with validation commands, risks, and remaining manual checks.
