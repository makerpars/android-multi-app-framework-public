name: Jules - Weekly Dependency Maintenance

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jules-weekly-deps:
    if: ${{ github.repository_owner == 'MakerPars' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_commit_log: true
          prompt: |
            Follow .github/jules/prompts/weekly-deps.md.
            Create a PR only for stable, verified, non-downgrade dependency maintenance.
            Do not use alpha, beta, rc, snapshot, or baseline-hiding changes.
            Run the relevant Gradle checks and include command results, risks, and manual gates in the PR.
