name: Jules - CI Failure Fix

on:
  workflow_run:
    workflows: ['Quality Gate']
    types: [completed]

permissions:
  contents: read

jobs:
  jules-ci-fix:
    if: >-
      ${{
        github.repository_owner == 'MakerPars' &&
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.pull_requests[0].head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true
          prompt: |
            Follow .github/jules/prompts/ci-fix.md.
            Fix only the failing Quality Gate signal for this same-repository PR branch.
            Do not change architecture, add baselines, weaken tests, touch secrets, publish, deploy, or auto-merge.
            Open a PR or update the existing branch with a concise validation summary.
