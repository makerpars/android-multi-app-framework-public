name: Jules - Monthly Performance

on:
  schedule:
    - cron: '0 4 15 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jules-monthly-performance:
    if: ${{ github.repository_owner == 'MakerPars' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
          include_commit_log: true
          prompt: |
            Follow .github/jules/prompts/monthly-performance.md.
            Focus on measured or clearly evidenced startup, ads, Firebase, Room, Compose, and image-loading performance risks.
            Do not make speculative performance rewrites or increase ad frequency.
            Open a PR only after relevant build/test/lint checks pass or document environment blockers.
